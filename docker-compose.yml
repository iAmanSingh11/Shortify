version: '3.9'

# Local development stack. In production you'll deploy:
#   - frontend -> Vercel
#   - backend  -> Render
#   - MongoDB  -> MongoDB Atlas (free M0)
#   - Redis    -> Upstash (free tier)
# This compose file is for spinning everything up locally, using a local
# Mongo + Redis container instead of the managed free tiers.

services:
  mongo:
    image: mongo:7
    container_name: url-shortener-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    container_name: url-shortener-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      BASE_URL: http://localhost:5000
      MONGODB_URI: mongodb://mongo:27017/url-shortener
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: local-dev-access-secret
      JWT_REFRESH_SECRET: local-dev-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GEO_API_URL: https://ipwho.is
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: url-shortener-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo-data:
  redis-data:
